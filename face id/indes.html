<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Recognition Studio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #0b1324;
      --bg-2: #101a33;
      --card: rgba(16, 24, 40, 0.7);
      --stroke: rgba(148, 163, 184, 0.25);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Spline Sans", system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      background: radial-gradient(900px 600px at 10% 10%, #1f2a44 0%, transparent 60%),
                  radial-gradient(900px 600px at 90% 0%, #1a2f3e 0%, transparent 55%),
                  linear-gradient(180deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .page {
      width: min(1100px, 92vw);
      padding: 32px 0 48px;
      display: grid;
      gap: 24px;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 24px 28px;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.12), rgba(34, 197, 94, 0.12));
      border: 1px solid var(--stroke);
      border-radius: 18px;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.35);
      color: #bae6fd;
      font-size: 13px;
      font-weight: 600;
      width: fit-content;
    }

    main {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      padding: 22px;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 50px rgba(2, 6, 23, 0.35);
    }

    .camera-wrap {
      display: grid;
      gap: 16px;
    }

    video {
      width: 100%;
      height: auto;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: #0b1220;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #0b1324;
      background: linear-gradient(135deg, var(--accent), #67e8f9);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 12px 20px rgba(14, 116, 144, 0.25);
    }

    button.secondary {
      background: linear-gradient(135deg, #cbd5f5, #dbeafe);
      color: #0f172a;
    }

    button.ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--stroke);
      box-shadow: none;
    }

    button:hover { transform: translateY(-1px); }

    .snapshots {
      display: grid;
      gap: 16px;
    }

    .snapshot {
      display: grid;
      gap: 8px;
    }

    .snapshot label {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    canvas {
      width: 100%;
      height: auto;
      aspect-ratio: 3 / 2;
      border-radius: 14px;
      border: 1px solid rgba(34, 197, 94, 0.35);
      background: #0b1220;
    }

    .result {
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: rgba(15, 23, 42, 0.6);
      font-weight: 600;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(148, 163, 184, 0.2);
      color: var(--muted);
    }

    .badge.ok {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .badge.bad {
      background: rgba(239, 68, 68, 0.2);
      color: #fecaca;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Face Recognition Studio</h1>
      <p class="subtitle">Capture two moments from your live camera and compare similarity using neural face embeddings.</p>
      <span class="status" id="modelStatus">Loading models…</span>
    </header>

    <main>
      <section class="card camera-wrap">
        <h2>Live Camera</h2>
        <video id="video" autoplay muted playsinline></video>
        <div class="controls">
          <button id="btnCapture1">Capture Face A</button>
          <button id="btnCapture2" class="secondary">Capture Face B</button>
          <button id="btnCompare" class="ghost">Compare Faces</button>
        </div>
        <p class="note">Tip: Keep the face centered and evenly lit for the best match score.</p>
      </section>

      <section class="card snapshots">
        <div class="snapshot">
          <label>Snapshot A</label>
          <canvas id="canvas1" width="480" height="320"></canvas>
        </div>
        <div class="snapshot">
          <label>Snapshot B</label>
          <canvas id="canvas2" width="480" height="320"></canvas>
        </div>
        <div class="result" id="result">
          <span>Awaiting captures…</span>
          <span class="badge" id="resultBadge">No data</span>
        </div>
      </section>
    </main>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
